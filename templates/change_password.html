{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <h1>Modifier mon mot de passe</h1>
  <p class="lead">Choisis un nouveau mot de passe sécurisé pour ton compte.</p>
</section>

<div class="panel" style="max-width: 620px;">
  <form method="post" class="form">
    <label for="old_password">Ancien mot de passe</label>

    <div class="password-field">
      <input
        id="old_password"
        name="old_password"
        type="password"
        autocomplete="current-password"
        required
        placeholder="Ancien mot de passe"
        data-password-input
      >

      <button
        type="button"
        class="password-toggle"
        data-password-toggle
        aria-label="Afficher ou masquer le mot de passe"
      >
        <svg data-eye viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>

        <svg data-eye-off viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a21.78 21.78 0 0 1 5.06-6.94"/>
          <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a21.8 21.8 0 0 1-2.56 3.94"/>
          <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>
          <path d="M1 1l22 22"/>
        </svg>
      </button>
    </div>

    <label for="new_password">Nouveau mot de passe (8 caractères minimum)</label>

    <div class="password-field">
      <input
        id="new_password"
        name="new_password"
        type="password"
        autocomplete="new-password"
        required
        minlength="8"
        placeholder="Nouveau mot de passe"
        data-password-input
        data-pw-main
      >

      <button
        type="button"
        class="password-toggle"
        data-password-toggle
        aria-label="Afficher ou masquer le mot de passe"
      >
        <svg data-eye viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>

        <svg data-eye-off viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a21.78 21.78 0 0 1 5.06-6.94"/>
          <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a21.8 21.8 0 0 1-2.56 3.94"/>
          <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>
          <path d="M1 1l22 22"/>
        </svg>
      </button>
    </div>

    <div class="pw-meter" data-pw-meter>
      <div class="pw-bar">
        <div class="pw-fill" data-pw-fill></div>
      </div>
      <div class="pw-label" data-pw-label>Force : —</div>
    </div>

    <button class="btn" type="submit">Mettre à jour</button>
  </form>
</div>
{% endblock %}
