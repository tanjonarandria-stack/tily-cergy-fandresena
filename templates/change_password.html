{% extends "base.html" %}
{% block content %}
<h1>Modifier mon mot de passe</h1>

<form method="post" class="form">

  <label>Ancien mot de passe</label>

  <div class="password-field">
    <input
      name="old_password"
      type="password"
      autocomplete="current-password"
      required
      data-password-input
    >

    <button type="button" class="password-toggle" data-password-toggle>

      <!-- OEIL -->
      <svg data-eye viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>

      <!-- OEIL BARRE -->
      <svg data-eye-off viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a21.78 21.78 0 0 1 5.06-6.94"/>
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a21.8 21.8 0 0 1-2.56 3.94"/>
        <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>
        <path d="M1 1l22 22"/>
      </svg>

    </button>
  </div>


  <label>Nouveau mot de passe (8 caractères minimum)</label>

  <div class="password-field">
    <input
      name="new_password"
      type="password"
      autocomplete="new-password"
      required
      minlength="8"
      data-password-input
    >

    <button type="button" class="password-toggle" data-password-toggle>

      <!-- OEIL -->
      <svg data-eye viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>

      <!-- OEIL BARRE -->
      <svg data-eye-off viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a21.78 21.78 0 0 1 5.06-6.94"/>
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a21.8 21.8 0 0 1-2.56 3.94"/>
        <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>
        <path d="M1 1l22 22"/>
      </svg>

    </button>
  </div>

  <button class="btn" type="submit">Mettre à jour</button>

</form>
{% endblock %}
