{% extends "base.html" %}
{% block content %}
<h1>Créer un album</h1>
<p class="muted">Réservé aux KP / RESPONSABLE validés et aux administrateurs.</p>

<form method="post" class="form">
  <label for="title">Titre</label>
  <input id="title" name="title" required placeholder="Ex : Week-end de groupe">

  <label for="description">Description</label>
  <textarea id="description" name="description" rows="4" placeholder="Ex : week-end de groupe, activité de service, camp, sortie..."></textarea>

  <label class="checkbox">
    <input type="checkbox" name="consent" value="yes" required>
    Je confirme respecter le droit à l’image (autorisation parentale pour mineurs, pas de photos sensibles).
  </label>

  <button class="btn" type="submit">Créer</button>
</form>
{% endblock %}
